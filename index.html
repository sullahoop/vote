<body>
    <div class="container">
        <p class="title" id="title">엠카운트다운 사전투표</p>
        <img src="./엔믹스 원클릭 문자 투표 _ MIXXUP_files/nmixx.jpg" alt="엔믹스" class="vote-image" loading="lazy">
        <p class="info" id="info_message" style="display: none;">※ 이 투표는 100원의 정보이용료가 부과됩니다 ※</p>
        <p class="countdown" id="redirect_message" style="display: none;">이동합니다</p>
        <button id="retry_button" style="display: inline-block;" onclick="urlRedirect()">다시 시도하기</button>
        <footer>
            <p>© 2024 SDY One Click Vote Service</p>
            <p>HOME | <a href="https://nmixx.net/">NMIXX.NET</a></p>
        </footer>
    </div>

    <script>
        // 서버에서 전달받은 투표 정보
        const voteInfo = {"title": "엠카운트다운 사전투표", "info": "", "before_vote_message": "엔믹스를 위해 투표해주세요!", "after_vote_message": "투표해주셔서 감사합니다", "android_url": "https://mnetplus.onelink.me/TRa8/t9zck1c1?custom_link_value=vote%2Fv2%2F6a02b7c44ffc181ab87c6db4", "ios_url": "https://mnetplus.onelink.me/TRa8/t9zck1c1?custom_link_value=vote%2Fv2%2F6a02b7c44ffc181ab87c6db4", "etc_url": "https://mnetplus.onelink.me/TRa8/t9zck1c1?custom_link_value=vote%2Fv2%2F6a02b7c44ffc181ab87c6db4", "open_time": "2000-01-01 00:00", "close_time": "2100-01-01 00:00"};
        
        class VoteApp {
            constructor() {
                this.elements = {};
                this.init();
            }

            init() {
                this.cacheElements();
                window.addEventListener("load", () => this.initializeApp());
            }

            cacheElements() {
                this.elements = {
                    title: document.getElementById("title"),
                    infoMessage: document.getElementById("info_message"),
                    redirectMessage: document.getElementById("redirect_message"),
                    retryButton: document.getElementById("retry_button")
                };
            }

            initializeApp() {
                this.updateUI();
                this.handleCountdown();
                // OS 감지는 내부적으로만 수행 (화면 표시 안함)
                this.detectPlatform();
            }

            updateUI() {
                this.elements.title.innerText = voteInfo.title || "[ TITLE ERROR ]";
                this.elements.infoMessage.innerText = voteInfo.info || "[ INFO ERROR ]";
                this.elements.retryButton.style.display = "none";
            }

            getPlatformSpecificUrl() {
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                
                if (/android|Tizen/i.test(userAgent)) {
                    return voteInfo.android_url;
                } else if (/iPad|iPhone|iPod|Mac OS X|watchOS/.test(userAgent) && !window.MSStream) {
                    return voteInfo.ios_url;
                } else {
                    return voteInfo.etc_url;
                }
            }

            detectPlatform() {
                // 플랫폼 감지는 내부적으로만 수행 (화면에 표시하지 않음)
                const userAgent = navigator.userAgent || navigator.vendor || window.opera;
                const osMap = [
                    { pattern: /android/i, name: "Android" },
                    { pattern: /Tizen/i, name: "Tizen(Watch)" },
                    { pattern: /iPad/i, name: "iOS(iPad)" },
                    { pattern: /iPhone/i, name: "iOS(iPhone)" },
                    { pattern: /iPod/i, name: "iOS(iPod)" },
                    { pattern: /watchOS/i, name: "watchOS(AppleWatch)" },
                    { pattern: /Windows NT/i, name: "Windows" },
                    { pattern: /Mac OS X/i, name: "MacOS" }
                ];

                let os = "기타(기기분류불가)";
                for (const { pattern, name } of osMap) {
                    if (pattern.test(userAgent) && !window.MSStream) {
                        os = name;
                        break;
                    }
                }

                // 플랫폼 정보를 내부적으로 저장 (필요시 사용)
                this.detectedPlatform = os;
                console.log(`Detected platform: ${os}`);
            }

            handleCountdown() {
                console.log(123);
                const now = new Date();
                const voteStartTime = new Date(voteInfo.open_time);
                const voteEndTime = new Date(voteInfo.close_time);

                if (now < voteStartTime) {
                    this.updateCountdown(voteStartTime);
                } else if (now >= voteStartTime && now <= voteEndTime) {
                    this.redirectToVote();
                } else {
                    this.endVote();
                }
            }

            updateCountdown(targetTime) {
                console.log(targetTime);
                const now = new Date();
                const timeDiff = targetTime - now;

                if (timeDiff <= 0) {
                    this.redirectToVote();
                    return;
                }

                const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

                this.elements.redirectMessage.innerText = 
                    `투표 시작 ${days}일 ${hours}시간 ${minutes}분 ${seconds}초 전입니다`;
                
                setTimeout(() => this.updateCountdown(targetTime), 1000);
            }

            redirectToVote() {
                return false;
                let secondsLeft = 2;
                this.elements.redirectMessage.innerText = `${secondsLeft}초 후 이동합니다`;

                const countdownInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft > 0) {
                        this.elements.redirectMessage.innerText = `${secondsLeft}초 후 이동합니다`;
                    } else {
                        clearInterval(countdownInterval);
                        this.elements.redirectMessage.innerText = "이동합니다";
                        this.urlRedirect();
                        setTimeout(() => {
                            this.elements.retryButton.style.display = "inline-block";
                            this.elements.redirectMessage.style.display = "none";
                        }, 1000);
                    }
                }, 1000);
            }

            urlRedirect() {
                const platformSpecificUrl = this.getPlatformSpecificUrl();
                window.location.href = platformSpecificUrl;
            }

            endVoteGoHome() {
                if (confirm("투표가 종료되었습니다.\n메인 페이지로 넘어가시겠습니까?")) {
                    window.location.href = "https://nmixx.net";
                }
            }

            endVote() {
                this.elements.redirectMessage.innerText = "투표가 종료되었습니다";
                setTimeout(() => this.endVoteGoHome(), 300);
            }
        }

        // 전역 함수로 유지 (onclick 이벤트에서 사용)
        window.urlRedirect = () => {
            if (window.voteApp) {
                window.voteApp.urlRedirect();
            }
        };

        // 앱 초기화
        window.voteApp = new VoteApp();
    </script>
